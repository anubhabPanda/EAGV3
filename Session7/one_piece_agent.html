<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Piece Anime Agent</title>
    <script>
    // Inline marked.js minimal parser to avoid CDN/CORS
    window.marked = {
        parse: function(md) {
            return md
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*)\*/gim, '<i>$1</i>')
                .replace(/\n/gim, '<br>');
        }
    };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .header {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .control-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        select, input, button {
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 5px;
            font-size: 14px;
        }

        select {
            flex: 1;
        }

        input[type="text"] {
            flex: 1;
        }

        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            display: none;
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .main-content {
            display: flex;
            gap: 20px;
            flex: 1;
            overflow: hidden;
        }

        .left-panel {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .agent-response {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow-y: auto;
            flex: 1;
        }

        .right-panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .file-tree {
            padding: 15px;
            overflow-y: auto;
            flex: 1;
        }

        .file-item {
            padding: 8px;
            cursor: pointer;
            border-radius: 5px;
            margin: 2px 0;
            transition: background 0.2s;
        }

        .file-item:hover {
            background: #f0f0f0;
        }

        .file-item.selected {
            background: #667eea;
            color: white;
        }

        .folder-item {
            font-weight: bold;
            color: #764ba2;
            margin-top: 10px;
        }

        .markdown-content {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: #667eea;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .markdown-content a {
            color: #764ba2;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .markdown-content pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }

        .nested {
            margin-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏴‍☠️ One Piece Anime Agent 🏴‍☠️</h1>
            <p>Ask questions about the One Piece universe!</p>
        </div>

        <div class="controls">
            <div class="control-row">
                <select id="folderSelect">
                    <option value="">Select a folder to index...</option>
                </select>
                <button id="indexBtn" disabled>📑 Index Pages</button>
            </div>
            <div class="control-row">
                <input type="text" id="queryInput" placeholder="Ask about One Piece (e.g., 'Who is Luffy?')">
                <button id="askBtn" disabled>🔍 Ask Agent</button>
            </div>
            <div class="progress-container" id="progressContainer">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill">0%</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="left-panel">
                <div class="agent-response" id="agentResponse">
                    <p class="loading">Select a folder and index pages to start asking questions...</p>
                </div>
            </div>
            <div class="right-panel">
                <div class="file-tree" id="fileTree">
                    <p class="loading">No folder selected</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/mcp';
        const SESSION_ID = 'web-session-' + Date.now();
        let currentFolder = '';
        let fileStructure = {};

        async function loadFolders() {
            try {
                const select = document.getElementById('folderSelect');

                async function getFolders(path = '.', prefix = '', depth = 0) {
                    if (depth > 3) return [];

                    const response = await fetch(`${API_URL}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: Date.now(),
                            method: 'tools/call',
                            params: {
                                name: 'list_dir',
                                arguments: { path }
                            }
                        })
                    });

                    const text = await response.text();
                    const lines = text.trim().split('\n');
                    let parsed = null;

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.substring(6);
                            try {
                                const data = JSON.parse(jsonStr);
                                if (data.result && data.result.content) {
                                    const resultText = data.result.content[0].text;
                                    parsed = JSON.parse(resultText);
                                    break;
                                }
                            } catch (e) {}
                        }
                    }

                    if (!parsed) return [];

                    const folders = [];
                    for (const entry of parsed.entries || []) {
                        if (entry.type === 'dir') {
                            const folderPath = path === '.' ? entry.name : `${path}/${entry.name}`;
                            const displayName = prefix ? `${prefix}/${entry.name}` : entry.name;
                            folders.push({ path: folderPath, name: displayName });

                            const subFolders = await getFolders(folderPath, displayName, depth + 1);
                            folders.push(...subFolders);
                        }
                    }
                    return folders;
                }

                const allFolders = await getFolders();
                allFolders.forEach(folder => {
                    const option = document.createElement('option');
                    option.value = folder.path;
                    option.textContent = folder.name;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Error loading folders:', error);
                alert('Error loading folders: ' + error.message);
            }
        }

        document.getElementById('folderSelect').addEventListener('change', async (e) => {
            currentFolder = e.target.value;
            if (currentFolder) {
                document.getElementById('indexBtn').disabled = false;
                await loadFileTree(currentFolder);
            }
        });

        async function loadFileTree(folder) {
            try {
                const tree = await buildFileTree(folder);
                fileStructure = tree;
                renderFileTree(tree);
            } catch (error) {
                console.error('Error loading file tree:', error);
            }
        }

        async function buildFileTree(path) {
            const response = await fetch(`${API_URL}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    jsonrpc: '2.0',
                    id: Date.now(),
                    method: 'tools/call',
                    params: {
                        name: 'list_dir',
                        arguments: { path }
                    }
                })
            });
            const text = await response.text();
            const lines = text.trim().split('\n');
            let result = null;

            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    const jsonStr = line.substring(6);
                    try {
                        const data = JSON.parse(jsonStr);
                        if (data.result && data.result.content) {
                            result = JSON.parse(data.result.content[0].text);
                            break;
                        }
                    } catch (e) {}
                }
            }

            const tree = { files: [], folders: {} };
            for (const entry of result.entries) {
                if (entry.type === 'file' && entry.name.endsWith('.md')) {
                    tree.files.push({ name: entry.name, path: `${path}/${entry.name}` });
                } else if (entry.type === 'dir') {
                    tree.folders[entry.name] = await buildFileTree(`${path}/${entry.name}`);
                }
            }
            return tree;
        }

        function renderFileTree(tree, container = null, level = 0) {
            if (!container) {
                container = document.getElementById('fileTree');
                container.innerHTML = '';
            }

            // Render files
            tree.files.forEach(file => {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-item';
                fileDiv.style.marginLeft = `${level * 15}px`;
                fileDiv.textContent = `📄 ${file.name}`;
                fileDiv.onclick = () => loadMarkdownFile(file.path);
                container.appendChild(fileDiv);
            });

            // Render folders
            Object.keys(tree.folders).forEach(folderName => {
                const folderDiv = document.createElement('div');
                folderDiv.className = 'folder-item';
                folderDiv.style.marginLeft = `${level * 15}px`;
                folderDiv.textContent = `📁 ${folderName}`;
                container.appendChild(folderDiv);

                renderFileTree(tree.folders[folderName], container, level + 1);
            });
        }

        async function loadMarkdownFile(path) {
            try {
                const response = await fetch(`${API_URL}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        id: Date.now(),
                        method: 'tools/call',
                        params: {
                            name: 'read_file',
                            arguments: { path }
                        }
                    })
                });
                const text = await response.text();
                const lines = text.trim().split('\n');
                let content = '';

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const jsonStr = line.substring(6);
                        try {
                            const data = JSON.parse(jsonStr);
                            if (data.result && data.result.content) {
                                content = JSON.parse(data.result.content[0].text).content;
                                break;
                            }
                        } catch (e) {}
                    }
                }

                // Render markdown in right panel
                const rightPanel = document.querySelector('.right-panel');
                rightPanel.innerHTML = `<div class="markdown-content"></div>`;
                const mdContent = rightPanel.querySelector('.markdown-content');
                mdContent.innerHTML = marked.parse(content);
            } catch (error) {
                console.error('Error loading markdown:', error);
            }
        }

        async function indexPages() {
            const btn = document.getElementById('indexBtn');
            btn.disabled = true;

            const progressContainer = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressFill');
            progressContainer.style.display = 'block';

            const allFiles = getAllFiles(fileStructure);
            let indexed = 0;

            for (const file of allFiles) {
                try {
                    await fetch(`${API_URL}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            jsonrpc: '2.0',
                            id: Date.now(),
                            method: 'tools/call',
                            params: {
                                name: 'index_document',
                                arguments: { path: file.path }
                            }
                        })
                    });
                    indexed++;
                    const progress = Math.round((indexed / allFiles.length) * 100);
                    progressFill.style.width = `${progress}%`;
                    progressFill.textContent = `${progress}% (${indexed}/${allFiles.length})`;
                } catch (error) {
                    console.error(`Error indexing ${file.path}:`, error);
                }
            }

            setTimeout(() => {
                progressContainer.style.display = 'none';
                progressFill.style.width = '0%';
                document.getElementById('askBtn').disabled = false;
                btn.disabled = false;

                const responseDiv = document.getElementById('agentResponse');
                responseDiv.innerHTML = `<p style="color: green;">✅ Successfully indexed ${indexed} files! You can now ask questions.</p>`;
            }, 500);
        }

        function getAllFiles(tree, files = []) {
            files.push(...tree.files);
            Object.values(tree.folders).forEach(folder => getAllFiles(folder, files));
            return files;
        }

        document.getElementById('indexBtn').addEventListener('click', indexPages);

        document.getElementById('askBtn').addEventListener('click', async () => {
            const query = document.getElementById('queryInput').value;
            if (!query.trim()) return;

            const responseDiv = document.getElementById('agentResponse');
            responseDiv.innerHTML = '<p class="loading">🤔 Thinking...</p>';

            try {
                // Search knowledge first
                const searchResponse = await fetch(`${API_URL}?sessionId=${SESSION_ID}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        jsonrpc: '2.0',
                        id: Date.now(),
                        method: 'tools/call',
                        params: {
                            name: 'search_knowledge',
                            arguments: { query, k: 5 }
                        }
                    })
                });
                const text = await searchResponse.text();
                const lines = text.trim().split('\n');
                let results = [];

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const jsonStr = line.substring(6);
                        try {
                            const data = JSON.parse(jsonStr);
                            if (data.result && data.result.content) {
                                results = JSON.parse(data.result.content[0].text);
                                break;
                            }
                        } catch (e) {}
                    }
                }

                let answer = `<h3>📚 Search Results for: "${query}"</h3>`;
                answer += `<p>Found ${results.length} relevant chunks:</p>`;

                results.forEach((result, idx) => {
                    answer += `
                        <div style="border-left: 3px solid #667eea; padding-left: 15px; margin: 15px 0;">
                            <h4>Result ${idx + 1}</h4>
                            <p><strong>Source:</strong> ${result.source}</p>
                            <p><strong>Content:</strong> ${result.chunk_preview.substring(0, 300)}...</p>
                        </div>
                    `;
                });

                responseDiv.innerHTML = answer;
            } catch (error) {
                responseDiv.innerHTML = `<p style="color: red;">❌ Error: ${error.message}</p>`;
            }
        });

        document.getElementById('queryInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('askBtn').click();
            }
        });

        loadFolders();
    </script>
</body>
</html>
