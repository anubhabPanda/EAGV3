<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Youtube Controller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div id="no-video" class="no-video">
      <div class="no-video-icon">📺</div>
      <p>No YouTube video playing</p>
      <small>Open a YouTube video to control it from here</small>
    </div>

    <div id="video-controls" class="video-controls" style="display: none;">
      <!-- Video Preview -->
      <div class="video-preview">
        <img id="thumbnail" src="" alt="Video thumbnail">
        <div class="video-title" id="video-title">Loading...</div>
      </div>

      <!-- Playback Controls -->
      <div class="controls">
        <!-- Video Navigation Controls -->
        <div class="video-nav-controls">
          <button id="prev-video" class="control-btn-small" title="Previous video">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>

          <button id="next-video" class="control-btn-small" title="Next video">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/>
            </svg>
          </button>
        </div>

        <!-- Play/Pause Button -->
        <div class="main-controls">
          <button id="skip-back" class="control-btn" title="Skip back 10s">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
              <text x="9" y="16" font-size="8" fill="currentColor">10</text>
            </svg>
          </button>

          <button id="play-pause" class="control-btn play-pause-btn" title="Play/Pause">
            <svg id="play-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="pause-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
              <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
            </svg>
          </button>

          <button id="skip-forward" class="control-btn" title="Skip forward 10s">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
              <text x="9" y="16" font-size="8" fill="currentColor">10</text>
            </svg>
          </button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
          <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
          <input type="range" id="progress-bar" min="0" max="100" value="0" step="0.1">
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
          <button id="mute-btn" class="control-btn-small" title="Mute/Unmute">
            <svg id="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
            </svg>
            <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
            </svg>
          </button>

          <button id="volume-down" class="control-btn-small" title="Volume down">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>
            </svg>
          </button>

          <input type="range" id="volume-slider" min="0" max="100" value="100" step="1">

          <button id="volume-up" class="control-btn-small" title="Volume up">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM16.5 12c0 1.77-1.02 3.29-2.5 4.03V7.97c1.48.74 2.5 2.26 2.5 4.03z"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Open Video Link -->
      <div class="actions">
        <button id="open-video" class="action-btn">Open Video Tab</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
