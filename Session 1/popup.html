<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Controller</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🎵 YouTube Control</h2>
      <div id="status" class="status">Looking for YouTube...</div>
    </div>
    
    <!-- Now Playing Section -->
    <div id="nowPlaying" class="now-playing" style="display: none;">
      <img id="videoThumbnail" src="" alt="Video thumbnail" class="thumbnail">
      <div class="video-info">
        <div id="videoTitle" class="video-title">No video playing</div>
        <div id="videoChannel" class="video-channel">Unknown</div>
        <div id="videoTime" class="video-time">0:00 / 0:00</div>
      </div>
    </div>
    
    <div class="controls">
      <div class="main-controls">
        <button id="previous" class="control-btn" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        
        <button id="playPause" class="control-btn play-pause-btn" title="Play/Pause">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
          </svg>
        </button>
        
        <button id="next" class="control-btn" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 18h2V6h-2zm-11-7l8.5-6v12z"/>
          </svg>
        </button>
      </div>
      
      <div class="secondary-controls">
        <button id="rewind" class="control-btn small" title="Rewind 10s">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
          </svg>
        </button>
        
        <button id="volumeDown" class="control-btn small" title="Volume Down">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 9v6h4l5 5V4l-5 5H7z"/>
          </svg>
        </button>
        
        <button id="volumeUp" class="control-btn small" title="Volume Up">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
        </button>
        
        <button id="forward" class="control-btn small" title="Forward 10s">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
