<div id="yt-controller-overlay" class="yt-controller-bar">
  <div class="yt-controller-content">
    <!-- Now Playing Info -->
    <div class="yt-now-playing">
      <img id="yt-thumbnail" src="" alt="" class="yt-thumbnail">
      <div class="yt-video-info">
        <div id="yt-video-title" class="yt-video-title">No video playing</div>
        <div id="yt-video-channel" class="yt-video-channel">YouTube Controller</div>
      </div>
    </div>
    
    <!-- Controls -->
    <div class="yt-controls">
      <button id="yt-btn-previous" class="yt-control-btn" title="Previous">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      
      <button id="yt-btn-rewind" class="yt-control-btn yt-small" title="Rewind 10s">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6h-2c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
        </svg>
        <span class="yt-btn-label">10</span>
      </button>
      
      <button id="yt-btn-play-pause" class="yt-control-btn yt-primary" title="Play/Pause">
        <svg id="yt-play-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
        <svg id="yt-pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
          <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>
        </svg>
      </button>
      
      <button id="yt-btn-forward" class="yt-control-btn yt-small" title="Forward 10s">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
        </svg>
        <span class="yt-btn-label">10</span>
      </button>
      
      <button id="yt-btn-next" class="yt-control-btn" title="Next">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 18h2V6h-2zm-11-7l8.5-6v12z"/>
        </svg>
      </button>
    </div>
    
    <!-- Volume & Time -->
    <div class="yt-right-section">
      <div id="yt-time-display" class="yt-time-display">0:00 / 0:00</div>
      
      <div class="yt-volume-controls">
        <button id="yt-btn-volume-down" class="yt-control-btn yt-small" title="Volume Down">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M7 9v6h4l5 5V4l-5 5H7z"/>
          </svg>
        </button>
        
        <div class="yt-volume-bar">
          <div id="yt-volume-fill" class="yt-volume-fill" style="width: 70%"></div>
        </div>
        
        <button id="yt-btn-volume-up" class="yt-control-btn yt-small" title="Volume Up">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
          </svg>
        </button>
      </div>
      
      <button id="yt-btn-close" class="yt-control-btn yt-close" title="Hide (Ctrl+Shift+Y)">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </div>
</div>
